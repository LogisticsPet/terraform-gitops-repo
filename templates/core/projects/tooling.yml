apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ${project_name}
  namespace: ${argo_namespace}
spec:
  description: "Project for auxiliary tooling resources in core platform"
  sourceRepos:
    - "${repo}"
  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceBlacklist:
    - group: "apps"
      kind: "Deployment"
